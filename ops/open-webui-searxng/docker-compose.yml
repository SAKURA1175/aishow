services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: aishow-searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
      - searxng-cache:/var/cache/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://localhost:8081/
      SEARXNG_PORT: 8080
      SEARXNG_BIND_ADDRESS: 0.0.0.0
      SEARXNG_SECRET: aishow-local-searxng-secret
    networks:
      - ai-search

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: aishow-open-webui
    restart: unless-stopped
    depends_on:
      - searxng
    ports:
      - "3001:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      WEBUI_URL: http://localhost:3001
      ENABLE_SIGNUP: "true"
      ENABLE_OPENAI_API: "true"
      ENABLE_OLLAMA_API: "false"
      OPENAI_API_BASE_URL: http://host.docker.internal:1234/v1
      OPENAI_API_BASE_URLS: http://host.docker.internal:1234/v1
      OPENAI_API_KEY: sk-lmstudio
      OPENAI_API_KEYS: sk-lmstudio
      TASK_MODEL_EXTERNAL: gemma-4-e4b-it
      AIOHTTP_CLIENT_TIMEOUT_OPENAI_MODEL_LIST: "30"
      ENABLE_WEB_SEARCH: "true"
      ENABLE_RAG_WEB_SEARCH: "true"
      WEB_SEARCH_ENGINE: searxng
      RAG_WEB_SEARCH_ENGINE: searxng
      SEARXNG_QUERY_URL: http://searxng:8080/search?q=<query>&format=json
      ENABLE_SEARCH_QUERY_GENERATION: "true"
      WEB_SEARCH_RESULT_COUNT: "5"
      RAG_WEB_SEARCH_RESULT_COUNT: "5"
      WEB_LOADER_CONCURRENT_REQUESTS: "2"
      RAG_WEB_SEARCH_CONCURRENT_REQUESTS: "2"
      WEB_LOADER_TIMEOUT: "15"
      BYPASS_WEB_SEARCH_WEB_LOADER: "false"
    networks:
      - ai-search

networks:
  ai-search:
    driver: bridge

volumes:
  open-webui-data:
  searxng-cache:
